<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ayush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --bg2: #fafafa;
    --border: #dbdbdb;
    --text: #262626;
    --text2: #8e8e8e;
    --header-h: 60px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --bg2: #121212;
      --border: #262626;
      --text: #f5f5f5;
      --text2: #a8a8a8;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
  }

  .logo {
    font-family: 'Georgia', serif; font-size: 22px;
    font-style: italic; font-weight: 400;
    color: var(--text); letter-spacing: -0.5px;
  }

  .header-icons { display: flex; gap: 20px; align-items: center; }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text); padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* Profile */
  .profile-section {
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px; max-width: 600px; margin: 0 auto;
  }

  .username { font-size: 20px; font-weight: 300; margin-bottom: 14px; color: var(--text); }

  .stats { display: flex; gap: 20px; }
  .stat-num { font-size: 16px; font-weight: 600; display: block; color: var(--text); }
  .stat-label { font-size: 13px; color: var(--text); }

  /* Tabs */
  .tabs {
    background: var(--bg); display: flex;
    border-bottom: 1px solid var(--border);
    max-width: 600px; margin: 0 auto;
    position: sticky; top: var(--header-h); z-index: 90;
  }

  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 12px 0;
    font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text2); cursor: pointer;
    background: none; border: none; border-bottom: 2px solid transparent;
    user-select: none;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; }

  /* Grid panels */
  .grid-wrap { max-width: 600px; margin: 0 auto; display: none; }
  .grid-wrap.active { display: block; }

  /* Posts — 3-col square grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  .grid-item {
    aspect-ratio: 1; overflow: hidden; cursor: pointer;
    position: relative; background: var(--border);
  }

  .grid-item img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.2s ease;
  }

  .grid-item:active img { transform: scale(0.97); }

  .grid-item .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.28);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .overlay svg { width: 22px; height: 22px; fill: #fff; }
  @media (hover: hover) {
    .grid-item:hover .overlay { opacity: 1; }
    .grid-item:hover img { transform: scale(1.04); }
  }

  /* Day — single column, full natural height */
  #wrap-day .grid {
    grid-template-columns: 1fr;
    gap: 2px;
  }
  #wrap-day .grid-item {
    aspect-ratio: unset;
  }
  #wrap-day .grid-item img {
    height: auto;
    width: 100%;
    object-fit: contain;
    background: var(--bg);
  }

  /* Loading */
  .loading-msg {
    text-align: center; padding: 48px 24px;
    color: var(--text2); font-size: 14px; grid-column: 1/-1;
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--text2); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty */
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--text2); grid-column: 1/-1;
  }
  .empty-state svg { width: 48px; height: 48px; stroke: var(--text2); fill: none; stroke-width: 1; margin-bottom: 14px; }
  .empty-state h3 { font-size: 18px; font-weight: 300; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.82);
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }

  .lb-card {
    background: var(--bg); width: min(468px, 100vw);
    max-height: 100dvh; overflow-y: auto;
    display: flex; flex-direction: column;
  }

  @media (min-width: 520px) {
    .lb-card { border-radius: 10px; max-height: 92dvh; }
  }

  .lb-top {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }

  .lb-mini-ring {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(#f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
    padding: 1.5px;
  }
  .lb-mini-bg {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--bg); padding: 1.5px;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .lb-mini-bg span {
    font-size: 11px; font-weight: 300; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; border-radius: 50%; background: var(--bg2);
  }

  .lb-uname { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); }

  .lb-x {
    background: none; border: none; cursor: pointer;
    color: var(--text); font-size: 20px; line-height: 1; padding: 4px;
  }

  .lb-img {
    width: 100%; object-fit: contain; display: block;
    background: #000; max-height: 80vh;
  }

  .lb-actions { display: flex; gap: 14px; padding: 10px 14px 2px; align-items: center; }
  .lb-actions .icon-btn svg { width: 26px; height: 26px; }
  .lb-actions .icon-btn.liked svg { fill: #ed4956; stroke: #ed4956; }

  .lb-counter { padding: 4px 14px; font-size: 13px; font-weight: 600; color: var(--text); }
  .lb-caption { padding: 2px 14px 16px; font-size: 13px; color: var(--text2); }

  .lb-nav {
    position: fixed; background: rgba(255,255,255,0.92);
    border: none; border-radius: 50%; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,0.25);
    top: 50%; transform: translateY(-50%); z-index: 1001;
  }
  .lb-nav.prev { left: 8px; }
  .lb-nav.next { right: 8px; }
  .lb-nav svg { width: 16px; height: 16px; stroke: #222; fill: none; stroke-width: 2.5; stroke-linecap: round; }

  @media (min-width: 520px) {
    .lb-nav.prev { left: calc(50% - 260px); }
    .lb-nav.next { right: calc(50% - 260px); }
  }
</style>
</head>
<body>

<!-- ============================================================
  CONFIG — Edit these to personalise your page
  ============================================================ -->
<script>
const CONFIG = {
  username: "ayush",

  postsFolder: "POSTS",   // images for Posts tab  → POSTS/1.jpg, POSTS/2.jpg …
  storyFolder: "STORY",   // images for Day tab    → STORY/1.jpg, STORY/2.jpg …
  imgExt: "jpg",          // file extension (jpg / jpeg / png / webp)
  startAt: 1,             // first number
  probeMax: 200,          // stop probing after this many
};
</script>
<!-- ============================================================ -->

<header>
  <span class="logo">Instagram</span>
  <div class="header-icons">
    <button class="icon-btn">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <button class="icon-btn">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
</header>

<div class="profile-section">
  <div class="username" id="profileUser"></div>
  <div class="stats">
    <div class="stat"><span class="stat-num" id="postCount">—</span><span class="stat-label">posts</span></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="posts">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Posts
  </button>
  <button class="tab" data-tab="day">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    Day
  </button>
  <button class="tab" data-tab="tagged">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
    Tagged
  </button>
</div>

<!-- Posts panel -->
<div class="grid-wrap active" id="wrap-posts">
  <div class="grid" id="grid-posts">
    <div class="loading-msg"><div class="spinner"></div>Loading photos…</div>
  </div>
</div>

<!-- Day panel -->
<div class="grid-wrap" id="wrap-day">
  <div class="grid" id="grid-day">
    <div class="loading-msg"><div class="spinner"></div>Loading photos…</div>
  </div>
</div>

<!-- Tagged panel -->
<div class="grid-wrap" id="wrap-tagged">
  <div class="grid">
    <div class="empty-state">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
      <h3>No tagged photos</h3>
      <p>Photos you're tagged in will appear here.</p>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-nav prev" id="lbPrev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="lb-card">
    <div class="lb-top">
      <div class="lb-mini-ring">
        <div class="lb-mini-bg"><span id="lbInitials"></span></div>
      </div>
      <span class="lb-uname" id="lbUser"></span>
      <button class="lb-x" id="lbClose">✕</button>
    </div>
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-actions">
      <button class="icon-btn" id="lbLike">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="lb-counter" id="lbCounter"></div>
    <div class="lb-caption" id="lbCaption"></div>
  </div>
  <button class="lb-nav next" id="lbNext"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
</div>

<script>
(function () {
  const initials = CONFIG.username.slice(0, 2).toUpperCase();
  document.getElementById('lbInitials').textContent = initials;
  document.getElementById('profileUser').textContent = CONFIG.username;
  document.getElementById('lbUser').textContent = CONFIG.username;

  // ── Tab switching ─────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.grid-wrap').forEach(w => w.classList.remove('active'));
      document.getElementById('wrap-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Probing ───────────────────────────────────────────────
  function src(folder, n) { return `${folder}/${n}.${CONFIG.imgExt}`; }

  function probe(folder, n) {
    return new Promise(resolve => {
      const i = new Image();
      i.onload = () => resolve(true);
      i.onerror = () => resolve(false);
      i.src = src(folder, n);
    });
  }

  async function discover(folder) {
    const found = []; let n = CONFIG.startAt, misses = 0;
    while (n <= CONFIG.probeMax) {
      const batch = [];
      for (let i = 0; i < 5 && n <= CONFIG.probeMax; i++, n++) batch.push({ n, p: probe(folder, n) });
      const res = await Promise.all(batch.map(b => b.p));
      res.forEach((ok, i) => { if (ok) { found.push(batch[i].n); misses = 0; } else misses++; });
      if (misses >= 10) break;
    }
    return found;
  }

  // ── State ─────────────────────────────────────────────────
  const imgs = { posts: [], day: [] };
  let cur = 0, activeTab = 'posts';
  const liked = new Set();

  // ── Render ────────────────────────────────────────────────
  function renderGrid(gridId, folder, nums, tab) {
    const el = document.getElementById(gridId);
    const list = nums.map(n => ({ s: src(folder, n), n }));
    imgs[tab] = list;
    el.innerHTML = '';
    if (!list.length) {
      el.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h3>No photos found</h3>
        <p>Put images in <strong>${folder}/</strong> named <strong>1.jpg, 2.jpg…</strong></p>
      </div>`;
      return;
    }
    if (tab === 'posts') document.getElementById('postCount').textContent = list.length;
    list.forEach((img, i) => {
      const d = document.createElement('div');
      d.className = 'grid-item';
      d.innerHTML = `<img src="${img.s}" alt="photo ${img.n}" loading="lazy">
        <div class="overlay"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>`;
      d.addEventListener('click', () => { activeTab = tab; openLB(i); });
      el.appendChild(d);
    });
  }

  // ── Lightbox ──────────────────────────────────────────────
  function openLB(i) {
    const list = imgs[activeTab]; cur = i;
    document.getElementById('lbImg').src = list[i].s;
    document.getElementById('lbCounter').textContent = `${i + 1} / ${list.length}`;
    document.getElementById('lbCaption').textContent = list[i].s;
    document.getElementById('lbLike').classList.toggle('liked', liked.has(activeTab + i));
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLB() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function moveLB(d) {
    const list = imgs[activeTab];
    cur = (cur + d + list.length) % list.length;
    openLB(cur);
  }

  document.getElementById('lbClose').addEventListener('click', closeLB);
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target.id === 'lightbox') closeLB(); });
  document.getElementById('lbPrev').addEventListener('click', () => moveLB(-1));
  document.getElementById('lbNext').addEventListener('click', () => moveLB(1));
  document.getElementById('lbLike').addEventListener('click', function () {
    const k = activeTab + cur;
    liked.has(k) ? liked.delete(k) : liked.add(k);
    this.classList.toggle('liked', liked.has(k));
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLB();
    if (e.key === 'ArrowLeft') moveLB(-1);
    if (e.key === 'ArrowRight') moveLB(1);
  });

  let tx = 0;
  document.querySelector('.lb-card').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  document.querySelector('.lb-card').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 45) moveLB(dx < 0 ? 1 : -1);
  }, { passive: true });

  // ── Boot ──────────────────────────────────────────────────
  discover(CONFIG.postsFolder).then(n => renderGrid('grid-posts', CONFIG.postsFolder, n, 'posts'));
  discover(CONFIG.storyFolder).then(n => renderGrid('grid-day',   CONFIG.storyFolder,   n, 'day'));
})();
</script>
</body>
</html>
