<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ayush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --bg2: #fafafa;
    --border: #dbdbdb;
    --text: #262626;
    --text2: #8e8e8e;
    --header-h: 60px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --bg2: #121212;
      --border: #262626;
      --text: #f5f5f5;
      --text2: #a8a8a8;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
  }

  .logo {
    font-family: 'Georgia', serif; font-size: 22px;
    font-style: italic; font-weight: 400;
    color: var(--text); letter-spacing: -0.5px;
  }

  .header-icons { display: flex; gap: 20px; align-items: center; }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text); padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* Profile — just username, no stats here */
  .profile-section {
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px; max-width: 600px; margin: 0 auto;
  }
  .username { font-size: 20px; font-weight: 300; color: var(--text); }

  /* Tabs with count badges */
  .tabs {
    background: var(--bg); display: flex;
    border-bottom: 1px solid var(--border);
    max-width: 600px; margin: 0 auto;
    position: sticky; top: var(--header-h); z-index: 90;
  }

  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 12px 4px;
    font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text2); cursor: pointer;
    background: none; border: none; border-bottom: 2px solid transparent;
    user-select: none; white-space: nowrap;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; flex-shrink: 0; }

  .tab-count {
    font-size: 10px; font-weight: 600;
    background: var(--text2); color: var(--bg);
    border-radius: 8px; padding: 1px 5px;
    min-width: 18px; text-align: center;
    opacity: 0; transition: opacity 0.3s;
  }
  .tab-count.visible { opacity: 1; }
  .tab.active .tab-count { background: var(--text); }

  /* Grid panels */
  .grid-wrap { max-width: 600px; margin: 0 auto; display: none; }
  .grid-wrap.active { display: block; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  .grid-item {
    aspect-ratio: 1; overflow: hidden; cursor: pointer;
    position: relative; background: var(--border);
  }

  /* Skeleton shimmer while image loads */
  .grid-item.skeleton::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, var(--border) 25%, var(--bg2) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .grid-item.skeleton img { opacity: 0; }
  .grid-item img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: opacity 0.25s, transform 0.2s;
    opacity: 1;
  }
  .grid-item:active img { transform: scale(0.97); }

  .grid-item .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.28);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .overlay svg { width: 22px; height: 22px; fill: #fff; }
  @media (hover: hover) {
    .grid-item:hover .overlay { opacity: 1; }
    .grid-item:hover img { transform: scale(1.04); }
  }

  /* Empty */
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--text2); grid-column: 1/-1;
  }
  .empty-state svg { width: 48px; height: 48px; stroke: var(--text2); fill: none; stroke-width: 1; margin-bottom: 14px; }
  .empty-state h3 { font-size: 18px; font-weight: 300; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* ── Lightbox ─────────────────────────────────────────────── */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.85);
    align-items: flex-start; justify-content: center;
    overflow-y: auto;
  }
  .lightbox.open { display: flex; }

  /* scroll-mode: full feed scroll starting from clicked image */
  .lb-feed {
    width: min(468px, 100vw);
    display: flex; flex-direction: column;
    padding-bottom: 40px;
  }

  .lb-post {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
    flex-shrink: 0;
  }

  .lb-post-top {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }

  .lb-mini-ring {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(#f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
    padding: 1.5px;
  }
  .lb-mini-bg {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--bg); padding: 1.5px;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .lb-mini-bg span {
    font-size: 11px; font-weight: 300; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; border-radius: 50%; background: var(--bg2);
  }

  .lb-post-uname { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); }

  .lb-close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text); font-size: 20px; line-height: 1; padding: 4px;
  }

  .lb-post-img {
    width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    background: var(--border);
  }

  .lb-post-actions { display: flex; gap: 14px; padding: 10px 14px 2px; align-items: center; }
  .lb-post-actions .icon-btn svg { width: 26px; height: 26px; }
  .lb-post-actions .icon-btn.liked svg { fill: #ed4956; stroke: #ed4956; }

  .lb-post-num { padding: 4px 14px 14px; font-size: 12px; color: var(--text2); }
</style>
</head>
<body>

<!-- ============================================================
  CONFIG
  ============================================================ -->
<script>
const CONFIG = {
  username: "ayush",
  postsFolder: "POSTS",   // POSTS/1.jpg, POSTS/2.jpg …
  storyFolder: "STORY",   // STORY/1.jpg, STORY/2.jpg …
  imgExt: "jpg",
  startAt: 1,
  probeMax: 500,          // raised for 200+ photos
};
</script>

<header>
  <span class="logo">Ayush</span>
  <div class="header-icons">
    <button class="icon-btn">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <button class="icon-btn">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
</header>

<div class="profile-section">
  <div class="username" id="profileUser"></div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="posts">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Posts
    <span class="tab-count" id="count-posts">0</span>
  </button>
  <button class="tab" data-tab="day">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    Day
    <span class="tab-count" id="count-day">0</span>
  </button>
  <button class="tab" data-tab="tagged">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
    Tagged
    <span class="tab-count" id="count-tagged">—</span>
  </button>
</div>

<!-- Posts panel -->
<div class="grid-wrap active" id="wrap-posts">
  <div class="grid" id="grid-posts"></div>
</div>

<!-- Day panel -->
<div class="grid-wrap" id="wrap-day">
  <div class="grid" id="grid-day"></div>
</div>

<!-- Tagged panel -->
<div class="grid-wrap" id="wrap-tagged">
  <div class="grid">
    <div class="empty-state">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
      <h3>No tagged photos</h3>
      <p>Photos you're tagged in will appear here.</p>
    </div>
  </div>
</div>

<!-- Lightbox (scrollable feed) -->
<div class="lightbox" id="lightbox">
  <div class="lb-feed" id="lbFeed"></div>
</div>

<script>
(function () {
  const initials = CONFIG.username.slice(0, 2).toUpperCase();
  document.getElementById('profileUser').textContent = CONFIG.username;

  // ── Tab switching ─────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.grid-wrap').forEach(w => w.classList.remove('active'));
      document.getElementById('wrap-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Streaming probe: add each image to grid as soon as confirmed ──
  function imgSrc(folder, n) { return `${folder}/${n}.${CONFIG.imgExt}`; }

  // Add a placeholder cell first, probe it, reveal on success, remove on fail
  function streamGrid(gridId, countId, folder, tabKey) {
    const grid = document.getElementById(gridId);
    const countEl = document.getElementById(countId);
    const tabImgs = [];
    let n = CONFIG.startAt;
    let running = 0;
    let done = false;
    let misses = 0;
    let finished = false;

    function updateCount() {
      countEl.textContent = tabImgs.length;
      countEl.classList.add('visible');
    }

    function tryNext() {
      if (finished || n > CONFIG.probeMax) return;
      const num = n++;
      const s = imgSrc(folder, num);
      running++;

      // Placeholder skeleton cell
      const cell = document.createElement('div');
      cell.className = 'grid-item skeleton';
      const imgEl = document.createElement('img');
      imgEl.alt = 'photo ' + num;
      const ov = document.createElement('div');
      ov.className = 'overlay';
      ov.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
      cell.appendChild(imgEl);
      cell.appendChild(ov);
      grid.appendChild(cell);

      imgEl.onload = () => {
        // Image exists — reveal it
        const idx = tabImgs.length;
        tabImgs.push({ s, n: num });
        cell.classList.remove('skeleton');
        misses = 0;
        cell.addEventListener('click', () => { openLB(tabKey, tabImgs, idx); });
        updateCount();
        running--;
        if (!finished) tryNext();
      };

      imgEl.onerror = () => {
        // Image missing — remove skeleton cell
        cell.remove();
        misses++;
        running--;
        if (misses >= 10) {
          finished = true;
          return;
        }
        if (!finished) tryNext();
      };

      imgEl.src = s;
    }

    // Start 8 concurrent probes for speed
    for (let i = 0; i < 8; i++) tryNext();
  }

  // ── Lightbox: scrollable feed starting at clicked index ───
  const liked = new Set();

  function openLB(tabKey, list, startIdx) {
    const lb = document.getElementById('lightbox');
    const feed = document.getElementById('lbFeed');
    feed.innerHTML = '';

    // Close button at the top
    const closeBar = document.createElement('div');
    closeBar.style.cssText = 'position:sticky;top:0;z-index:10;display:flex;justify-content:flex-end;padding:10px 14px;background:rgba(0,0,0,0.6);width:100%;';
    closeBar.innerHTML = `<button style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1;padding:4px;">✕</button>`;
    closeBar.querySelector('button').addEventListener('click', closeLB);
    feed.appendChild(closeBar);

    // Render all posts
    list.forEach((img, i) => {
      const post = document.createElement('div');
      post.className = 'lb-post';
      post.id = 'lb-post-' + i;

      const likeKey = tabKey + i;
      const isLiked = liked.has(likeKey);

      post.innerHTML = `
        <div class="lb-post-top">
          <div class="lb-mini-ring"><div class="lb-mini-bg"><span>${initials}</span></div></div>
          <span class="lb-post-uname">${CONFIG.username}</span>
        </div>
        <img class="lb-post-img" src="${img.s}" alt="photo ${img.n}" loading="lazy">
        <div class="lb-post-actions">
          <button class="icon-btn like-btn${isLiked ? ' liked' : ''}" data-key="${likeKey}">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="1.8"/></svg>
          </button>
          <button class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button class="icon-btn">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="lb-post-num">${i + 1} / ${list.length}</div>`;

      post.querySelector('.like-btn').addEventListener('click', function () {
        const k = this.dataset.key;
        liked.has(k) ? liked.delete(k) : liked.add(k);
        this.classList.toggle('liked', liked.has(k));
      });

      feed.appendChild(post);
    });

    lb.classList.add('open');
    document.body.style.overflow = 'hidden';

    // Scroll to the clicked image after render
    requestAnimationFrame(() => {
      const target = document.getElementById('lb-post-' + startIdx);
      if (target) target.scrollIntoView({ behavior: 'instant', block: 'start' });
    });
  }

  function closeLB() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lbFeed').innerHTML = '';
    document.body.style.overflow = '';
  }

  // Close on backdrop tap
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLB();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) closeLB();
  });

  // ── Boot ──────────────────────────────────────────────────
  streamGrid('grid-posts', 'count-posts', CONFIG.postsFolder, 'posts');
  streamGrid('grid-day',   'count-day',   CONFIG.storyFolder,  'day');
})();
</script>
</body>
</html>
