<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Ayush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --bg2: #fafafa;
    --border: #dbdbdb;
    --text: #262626;
    --text2: #8e8e8e;
    --header-h: 60px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --bg2: #121212;
      --border: #262626;
      --text: #f5f5f5;
      --text2: #a8a8a8;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
  }

  .logo {
    font-family: 'Georgia', serif; font-size: 22px;
    font-style: italic; font-weight: 400;
    color: var(--text); letter-spacing: -0.5px;
  }

  .header-icons { display: flex; gap: 20px; align-items: center; }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text); padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* Profile — just username, no stats here */
  .profile-section {
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px; max-width: 600px; margin: 0 auto;
  }
  .username { font-size: 20px; font-weight: 300; color: var(--text); }

  /* Tabs with count badges */
  .tabs {
    background: var(--bg); display: flex;
    border-bottom: 1px solid var(--border);
    max-width: 600px; margin: 0 auto;
    position: sticky; top: var(--header-h); z-index: 90;
  }

  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 12px 4px;
    font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text2); cursor: pointer;
    background: none; border: none; border-bottom: 2px solid transparent;
    user-select: none; white-space: nowrap;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; flex-shrink: 0; }

  .tab-count {
    font-size: 10px; font-weight: 600;
    background: var(--text2); color: var(--bg);
    border-radius: 8px; padding: 1px 5px;
    min-width: 18px; text-align: center;
    opacity: 0; transition: opacity 0.3s;
  }
  .tab-count.visible { opacity: 1; }
  .tab.active .tab-count { background: var(--text); }

  /* Grid panels */
  .grid-wrap { max-width: 600px; margin: 0 auto; display: none; }
  .grid-wrap.active { display: block; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  .grid-item {
    aspect-ratio: 1; overflow: hidden; cursor: pointer;
    position: relative; background: var(--border);
  }

  /* Skeleton shimmer while image loads */
  .grid-item.skeleton::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, var(--border) 25%, var(--bg2) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .grid-item.skeleton img { opacity: 0; }
  .grid-item img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: opacity 0.25s, transform 0.2s;
    opacity: 1;
  }
  .grid-item:active img { transform: scale(0.97); }

  .grid-item .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.28);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .overlay svg { width: 22px; height: 22px; fill: #fff; }
  @media (hover: hover) {
    .grid-item:hover .overlay { opacity: 1; }
    .grid-item:hover img { transform: scale(1.04); }
  }

  /* Video grid items */
  .grid-item video {
    width: 100%; height: 100%; object-fit: cover; display: block;
    pointer-events: none;
  }
  .grid-item .vid-play {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .vid-play svg { width: 32px; height: 32px; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5)); }

  /* Empty */
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--text2); grid-column: 1/-1;
  }
  .empty-state svg { width: 48px; height: 48px; stroke: var(--text2); fill: none; stroke-width: 1; margin-bottom: 14px; }
  .empty-state h3 { font-size: 18px; font-weight: 300; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* ── Lightbox ─────────────────────────────────────────────── */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.85);
    align-items: flex-start; justify-content: center;
    overflow-y: auto;
  }
  .lightbox.open { display: flex; }

  /* scroll-mode: full feed scroll starting from clicked image */
  .lb-feed {
    width: min(468px, 100vw);
    display: flex; flex-direction: column;
    padding-bottom: 40px;
  }

  .lb-post {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
    flex-shrink: 0;
  }

  .lb-post-top {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }

  .lb-mini-ring {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(#f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
    padding: 1.5px;
  }
  .lb-mini-bg {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--bg); padding: 1.5px;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .lb-mini-bg span {
    font-size: 11px; font-weight: 300; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; border-radius: 50%; background: var(--bg2);
  }

  .lb-post-uname { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); }

  .lb-close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text); font-size: 20px; line-height: 1; padding: 4px;
  }

  .lb-post-img {
    width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    background: var(--border);
  }

  .lb-post-actions { display: flex; gap: 14px; padding: 10px 14px 2px; align-items: center; }
  .lb-post-actions .icon-btn svg { width: 26px; height: 26px; }
  .lb-post-actions .icon-btn.liked svg { fill: #ed4956; stroke: #ed4956; }

  .lb-post-num { padding: 4px 14px 14px; font-size: 12px; color: var(--text2); }

  .lb-post-video {
    width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    background: #000;
  }
</style>
</head>
<body>

<!-- ============================================================
  CONFIG
  ============================================================ -->
<script>
const CONFIG = {
  username: "ayush",
  postsFolder: "POSTS",   // POSTS/1.jpg, POSTS/2.jpg …
  storyFolder: "STORY",   // STORY/1.jpg, STORY/2.jpg …
  vidFolder:   "VID",     // VID/1.mp4, VID/2.mp4 …
  imgExt: "jpg",
  vidExt: "mp4",
  startAt: 1,
  probeMax: 500,
};
</script>

<header>
  <span class="logo">Ayush</span>
  <div class="header-icons">
    <button class="icon-btn">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="posts">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Posts
    <span class="tab-count" id="count-posts">0</span>
  </button>
  <button class="tab" data-tab="day">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    Day
    <span class="tab-count" id="count-day">0</span>
  </button>
  <button class="tab" data-tab="clips">
    <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    Clips
    <span class="tab-count" id="count-clips">0</span>
  </button>
</div>

<!-- Posts panel -->
<div class="grid-wrap active" id="wrap-posts">
  <div class="grid" id="grid-posts"></div>
</div>

<!-- Day panel -->
<div class="grid-wrap" id="wrap-day">
  <div class="grid" id="grid-day"></div>
</div>

<!-- Clips panel -->
<div class="grid-wrap" id="wrap-clips">
  <div class="grid" id="grid-clips"></div>
</div>

<!-- Lightbox (scrollable feed) -->
<div class="lightbox" id="lightbox">
  <div class="lb-feed" id="lbFeed"></div>
</div>

<script>
(function () {
  const initials = CONFIG.username.slice(0, 2).toUpperCase();

  // ── Tab switching ─────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.grid-wrap').forEach(w => w.classList.remove('active'));
      document.getElementById('wrap-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Streaming image grid ───────────────────────────────────
  function streamGrid(gridId, countId, folder, ext, tabKey) {
    const grid = document.getElementById(gridId);
    const countEl = document.getElementById(countId);
    const tabItems = [];
    let n = CONFIG.startAt, misses = 0, finished = false;

    function updateCount() {
      countEl.textContent = tabItems.length;
      countEl.classList.add('visible');
    }

    function tryNext() {
      if (finished || n > CONFIG.probeMax) return;
      const num = n++;
      const s = `${folder}/${num}.${ext}`;

      const cell = document.createElement('div');
      cell.className = 'grid-item skeleton';

      const ov = document.createElement('div');
      ov.className = 'overlay';
      ov.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

      grid.appendChild(cell);

      function onFound() {
        const idx = tabItems.length;
        tabItems.push({ s, n: num, isVideo: ext === CONFIG.vidExt });
        cell.classList.remove('skeleton');
        misses = 0;
        cell.addEventListener('click', () => openLB(tabKey, tabItems, idx));
        updateCount();
        if (!finished) tryNext();
      }

      function onMiss() {
        cell.remove();
        misses++;
        if (misses >= 10) { finished = true; return; }
        if (!finished) tryNext();
      }

      if (ext === CONFIG.vidExt) {
        // Probe video via fetch HEAD to avoid loading the whole file
        const vid = document.createElement('video');
        vid.preload = 'metadata';
        vid.muted = true;
        vid.playsInline = true;

        // Show thumbnail from first frame
        const imgThumb = document.createElement('img');
        imgThumb.alt = 'video ' + num;
        imgThumb.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.25s;';

        // Play icon badge
        const playBadge = document.createElement('div');
        playBadge.className = 'vid-play';
        playBadge.innerHTML = `<svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.35)"/><polygon points="10,8 17,12 10,16" fill="white"/></svg>`;

        cell.appendChild(imgThumb);
        cell.appendChild(playBadge);
        cell.appendChild(ov);

        vid.onloadedmetadata = () => {
          // Grab a thumbnail by rendering to canvas
          vid.currentTime = 0.1;
        };
        vid.onseeked = () => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = 200; canvas.height = 200;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(vid, 0, 0, 200, 200);
            imgThumb.src = canvas.toDataURL('image/jpeg', 0.7);
            imgThumb.style.opacity = '1';
          } catch(e) {}
          vid.src = '';
          onFound();
        };
        vid.onerror = onMiss;
        vid.src = s;
      } else {
        const imgEl = document.createElement('img');
        imgEl.alt = 'photo ' + num;
        cell.appendChild(imgEl);
        cell.appendChild(ov);

        imgEl.onload = () => { onFound(); };
        imgEl.onerror = onMiss;
        imgEl.src = s;
      }
    }

    for (let i = 0; i < 8; i++) tryNext();
  }

  // ── Lightbox: scrollable feed ──────────────────────────────
  const liked = new Set();
  let activeLBVideos = [];

  function openLB(tabKey, list, startIdx) {
    const lb = document.getElementById('lightbox');
    const feed = document.getElementById('lbFeed');
    feed.innerHTML = '';
    activeLBVideos = [];

    list.forEach((item, i) => {
      const post = document.createElement('div');
      post.className = 'lb-post';
      post.id = 'lb-post-' + i;

      const likeKey = tabKey + i;
      const isLiked = liked.has(likeKey);

      const actionsHTML = `
        <div class="lb-post-actions">
          <button class="icon-btn like-btn${isLiked ? ' liked' : ''}" data-key="${likeKey}">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="1.8"/></svg>
          </button>
          <button class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
        <div class="lb-post-num">${i + 1} / ${list.length}</div>`;

      if (item.isVideo) {
        post.innerHTML = actionsHTML;
        // Insert video element
        const vid = document.createElement('video');
        vid.className = 'lb-post-video';
        vid.src = item.s;
        vid.controls = true;
        vid.playsInline = true;
        vid.muted = false;
        vid.preload = 'metadata';
        // Insert before actions
        post.querySelector('.lb-post-actions').before(vid);
        activeLBVideos.push(vid);
      } else {
        post.innerHTML =
          `<img class="lb-post-img" src="${item.s}" alt="photo ${item.n}" loading="lazy">` +
          actionsHTML;
      }

      post.querySelector('.like-btn').addEventListener('click', function () {
        const k = this.dataset.key;
        liked.has(k) ? liked.delete(k) : liked.add(k);
        this.classList.toggle('liked', liked.has(k));
      });

      feed.appendChild(post);
    });

    lb.classList.add('open');
    document.body.style.overflow = 'hidden';

    requestAnimationFrame(() => {
      const target = document.getElementById('lb-post-' + startIdx);
      if (target) target.scrollIntoView({ behavior: 'instant', block: 'start' });
    });
  }

  function closeLB() {
    // Pause all videos before closing
    activeLBVideos.forEach(v => { try { v.pause(); } catch(e){} });
    activeLBVideos = [];
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lbFeed').innerHTML = '';
    document.body.style.overflow = '';
  }

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLB();
  });

  // Swipe right to close lightbox
  (function() {
    let startX = 0, startY = 0;
    const lb = document.getElementById('lightbox');
    lb.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    lb.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      if (dx > 80 && dy < 60) closeLB();
    }, { passive: true });
  })();

  // Prevent pinch-to-zoom globally
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  document.addEventListener('gesturestart', e => e.preventDefault());

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('open')) closeLB();
  });

  // ── Boot ──────────────────────────────────────────────────
  streamGrid('grid-posts', 'count-posts', CONFIG.postsFolder, CONFIG.imgExt, 'posts');
  streamGrid('grid-day',   'count-day',   CONFIG.storyFolder, CONFIG.imgExt, 'day');
  streamGrid('grid-clips', 'count-clips', CONFIG.vidFolder,   CONFIG.vidExt, 'clips');
})();
</script>
</body>
</html>
