<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ayush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --bg2: #fafafa;
    --border: #dbdbdb;
    --text: #262626;
    --text2: #8e8e8e;
    --header-h: 60px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --bg2: #121212;
      --border: #262626;
      --text: #f5f5f5;
      --text2: #a8a8a8;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  .logo {
    font-family: 'Georgia', serif;
    font-size: 22px;
    font-style: italic;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.5px;
    text-decoration: none;
  }

  .header-icons { display: flex; gap: 20px; align-items: center; }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text); padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* Profile */
  .profile-section {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
    display: flex;
    align-items: flex-start;
    gap: 24px;
    max-width: 600px;
    margin: 0 auto;
  }

  .avatar-ring {
    width: 86px; height: 86px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(#f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
    padding: 2.5px;
    display: flex; align-items: center; justify-content: center;
  }

  .avatar-bg {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--bg); padding: 2.5px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .avatar-bg span {
    font-size: 30px; font-weight: 300; color: var(--text2);
    width: 100%; height: 100%; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg2);
  }

  .profile-info { flex: 1; min-width: 0; }

  .username { font-size: 20px; font-weight: 300; margin-bottom: 14px; color: var(--text); }

  .stats { display: flex; gap: 20px; margin-bottom: 14px; }
  .stat { text-align: center; }
  .stat-num { font-size: 16px; font-weight: 600; display: block; color: var(--text); }
  .stat-label { font-size: 13px; color: var(--text); }

  .bio { font-size: 14px; line-height: 1.5; color: var(--text); }
  .bio strong { font-weight: 600; display: block; }

  /* Tabs */
  .tabs {
    background: var(--bg);
    display: flex;
    border-bottom: 1px solid var(--border);
    max-width: 600px;
    margin: 0 auto;
    position: sticky;
    top: var(--header-h);
    z-index: 90;
  }

  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 12px 0;
    font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text2); cursor: pointer;
    background: none; border: none; border-bottom: 2px solid transparent;
    user-select: none;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; }

  /* Grid */
  .grid-wrap { max-width: 600px; margin: 0 auto; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }

  .grid-item {
    aspect-ratio: 1; overflow: hidden; cursor: pointer;
    position: relative; background: var(--border);
  }

  .grid-item img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.2s ease;
  }

  .grid-item:active img { transform: scale(0.97); }

  .grid-item .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.28);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .overlay svg { width: 22px; height: 22px; fill: #fff; }
  @media (hover: hover) {
    .grid-item:hover .overlay { opacity: 1; }
    .grid-item:hover img { transform: scale(1.04); }
  }

  /* Loading */
  .loading-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--text2);
    font-size: 14px;
    grid-column: 1/-1;
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--text2); border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty */
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--text2); grid-column: 1/-1;
  }
  .empty-state svg { width: 48px; height: 48px; stroke: var(--text2); fill: none; stroke-width: 1; margin-bottom: 14px; }
  .empty-state h3 { font-size: 18px; font-weight: 300; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.82);
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }

  .lb-card {
    background: var(--bg);
    width: min(468px, 100vw);
    max-height: 100dvh; overflow-y: auto;
    display: flex; flex-direction: column;
  }

  @media (min-width: 520px) {
    .lb-card { border-radius: 10px; max-height: 92dvh; }
  }

  .lb-top {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .lb-mini-ring {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(#f09433, #e6683c, #dc2743, #cc2366, #bc1888, #f09433);
    padding: 1.5px;
  }
  .lb-mini-bg {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--bg); padding: 1.5px;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .lb-mini-bg span {
    font-size: 11px; font-weight: 300; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--bg2);
  }

  .lb-uname { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); }

  .lb-x {
    background: none; border: none; cursor: pointer;
    color: var(--text); font-size: 20px; line-height: 1; padding: 4px;
  }

  .lb-img {
    width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    background: var(--border);
  }

  .lb-actions {
    display: flex; gap: 14px; padding: 10px 14px 2px; align-items: center;
  }
  .lb-actions .icon-btn svg { width: 26px; height: 26px; }
  .lb-actions .icon-btn.liked svg { fill: #ed4956; stroke: #ed4956; }

  .lb-counter { padding: 4px 14px; font-size: 13px; font-weight: 600; color: var(--text); }
  .lb-caption { padding: 2px 14px 16px; font-size: 13px; color: var(--text2); }

  .lb-nav {
    position: fixed;
    background: rgba(255,255,255,0.92);
    border: none; border-radius: 50%;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,0.25);
    top: 50%; transform: translateY(-50%); z-index: 1001;
  }
  .lb-nav.prev { left: 8px; }
  .lb-nav.next { right: 8px; }
  .lb-nav svg { width: 16px; height: 16px; stroke: #222; fill: none; stroke-width: 2.5; stroke-linecap: round; }

  @media (min-width: 520px) {
    .lb-nav.prev { left: calc(50% - 260px); }
    .lb-nav.next { right: calc(50% - 260px); }
  }
</style>
</head>
<body>

<!-- ============================================================
  CONFIG — Edit these to personalise your page
  ============================================================ -->
<script>
const CONFIG = {
  username: "ayush",
  displayName: "Ayush",
  bio: "📸 My photos",

  imgFolder: "ayush",      // subfolder where images live
  imgExt: "jpg",           // extension: jpg, jpeg, png, webp
  startAt: 1,              // first image number
  probe: true,             // true = auto-detect how many images exist
  probeMax: 200,           // won't look beyond this number
};
</script>
<!-- ============================================================ -->

<header>
  <span class="logo">Instagram</span>
  <div class="header-icons">
    <button class="icon-btn">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <button class="icon-btn">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
</header>

<div class="profile-section">
  <div class="avatar-ring">
    <div class="avatar-bg">
      <span id="avatarText">AY</span>
    </div>
  </div>
  <div class="profile-info">
    <div class="username" id="profileUser"></div>
    <div class="stats">
      <div class="stat"><span class="stat-num" id="postCount">—</span><span class="stat-label">posts</span></div>
      <div class="stat"><span class="stat-num">—</span><span class="stat-label">followers</span></div>
      <div class="stat"><span class="stat-num">—</span><span class="stat-label">following</span></div>
    </div>
    <div class="bio">
      <strong id="displayName"></strong>
      <span id="bioText"></span>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Posts
  </button>
  <button class="tab">
    <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M9.5 14.5l5-5M14.5 14.5V9.5H9.5"/></svg>
    Reels
  </button>
  <button class="tab">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
    Tagged
  </button>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="loading-msg">
      <div class="spinner"></div>
      Loading photos…
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-nav prev" id="lbPrev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="lb-card">
    <div class="lb-top">
      <div class="lb-mini-ring">
        <div class="lb-mini-bg"><span id="lbInitials"></span></div>
      </div>
      <span class="lb-uname" id="lbUser"></span>
      <button class="lb-x" id="lbClose">✕</button>
    </div>
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-actions">
      <button class="icon-btn" id="lbLike">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="lb-counter" id="lbCounter"></div>
    <div class="lb-caption" id="lbCaption"></div>
  </div>
  <button class="lb-nav next" id="lbNext"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
</div>

<script>
(function () {
  // Apply config to DOM
  const initials = CONFIG.username.slice(0, 2).toUpperCase();
  document.getElementById('avatarText').textContent = initials;
  document.getElementById('lbInitials').textContent = initials;
  document.getElementById('profileUser').textContent = CONFIG.username;
  document.getElementById('displayName').textContent = CONFIG.displayName;
  document.getElementById('bioText').textContent = CONFIG.bio;
  document.getElementById('lbUser').textContent = CONFIG.username;

  const grid = document.getElementById('grid');
  let images = [];   // [{src, num}]
  let current = 0;
  const liked = new Set();

  // ── Image probing ──────────────────────────────────────────
  function imgSrc(n) {
    return `${CONFIG.imgFolder}/${n}.${CONFIG.imgExt}`;
  }

  function probeImage(n) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload  = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = imgSrc(n);
    });
  }

  // Probe in batches of 5 — fast but not hammering the server
  async function discoverImages() {
    const found = [];
    let n = CONFIG.startAt;
    let consecutiveMisses = 0;

    while (n <= CONFIG.probeMax) {
      const batch = [];
      for (let i = 0; i < 5 && n <= CONFIG.probeMax; i++, n++) {
        batch.push({ n, p: probeImage(n) });
      }
      const results = await Promise.all(batch.map(b => b.p));
      results.forEach((ok, i) => {
        if (ok) { found.push(batch[i].n); consecutiveMisses = 0; }
        else consecutiveMisses++;
      });
      // Stop if 10 consecutive misses (gap tolerance = 2 batches)
      if (consecutiveMisses >= 10) break;
    }
    return found;
  }

  // ── Render grid ────────────────────────────────────────────
  function renderGrid(nums) {
    images = nums.map(n => ({ src: imgSrc(n), num: n }));
    document.getElementById('postCount').textContent = images.length;
    grid.innerHTML = '';

    if (!images.length) {
      grid.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h3>No photos found</h3>
        <p>Make sure your images are in the <strong>ayush/</strong> folder<br>and named <strong>1.jpg, 2.jpg …</strong></p>
      </div>`;
      return;
    }

    images.forEach((img, i) => {
      const el = document.createElement('div');
      el.className = 'grid-item';
      el.innerHTML = `
        <img src="${img.src}" alt="photo ${img.num}" loading="lazy">
        <div class="overlay">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>`;
      el.addEventListener('click', () => openLB(i));
      grid.appendChild(el);
    });
  }

  // ── Lightbox ───────────────────────────────────────────────
  function openLB(i) {
    current = i;
    const img = images[i];
    document.getElementById('lbImg').src = img.src;
    document.getElementById('lbCounter').textContent = `Photo ${i + 1} of ${images.length}`;
    document.getElementById('lbCaption').textContent = img.src;
    const likeBtn = document.getElementById('lbLike');
    likeBtn.classList.toggle('liked', liked.has(i));
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLB() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function moveLB(dir) {
    current = (current + dir + images.length) % images.length;
    openLB(current);
  }

  document.getElementById('lbClose').addEventListener('click', closeLB);
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLB();
  });
  document.getElementById('lbPrev').addEventListener('click', () => moveLB(-1));
  document.getElementById('lbNext').addEventListener('click', () => moveLB(1));

  document.getElementById('lbLike').addEventListener('click', function () {
    liked.has(current) ? liked.delete(current) : liked.add(current);
    this.classList.toggle('liked', liked.has(current));
  });

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLB();
    if (e.key === 'ArrowLeft') moveLB(-1);
    if (e.key === 'ArrowRight') moveLB(1);
  });

  // Touch swipe
  let tx = 0;
  const lbCard = document.querySelector('.lb-card');
  lbCard.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  lbCard.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 45) moveLB(dx < 0 ? 1 : -1);
  }, { passive: true });

  // ── Boot ───────────────────────────────────────────────────
  discoverImages().then(renderGrid);
})();
</script>
</body>
</html>
